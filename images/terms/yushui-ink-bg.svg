<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecef"/>
      <stop offset="55%" stop-color="#dfe4e6"/>
      <stop offset="100%" stop-color="#d4dadc"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eef1f2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#eef1f2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#eef1f2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <!-- distant peaks -->
  <path d="M0 520 Q180 420 320 480 T640 440 T960 500 T1200 460 L1200 800 L0 800 Z" fill="#c5cdd0" opacity="0.45"/>
  <path d="M0 580 Q240 500 420 540 T780 510 T1200 550 L1200 800 L0 800 Z" fill="#b8c2c6" opacity="0.35"/>
  <!-- mid hills -->
  <path d="M0 620 Q200 560 380 590 T720 570 T1200 610 L1200 800 L0 800 Z" fill="#a8b4b8" opacity="0.28"/>
  <!-- ink tree hints -->
  <g opacity="0.18" fill="#8a9498">
    <ellipse cx="180" cy="590" rx="8" ry="22"/>
    <ellipse cx="920" cy="580" rx="10" ry="26"/>
    <ellipse cx="640" cy="600" rx="6" ry="18"/>
  </g>
  <!-- water -->
  <path d="M0 680 Q300 660 600 670 T1200 665 L1200 800 L0 800 Z" fill="#bcc8cc" opacity="0.22"/>
  <!-- mist band -->
  <rect y="380" width="1200" height="280" fill="url(#mist)"/>
  <rect y="500" width="1200" height="120" fill="#eef1f2" opacity="0.35"/>
</svg>
